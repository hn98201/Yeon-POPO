name: 달걀이론 포트폴리오 자동 업데이트

on:
  schedule:
    - cron: '0 22 * * 1-5'    # 평일 7:00 KST ← 일일 현황 전용
    # 평일 오전 7:30 KST = UTC 22:30 (전날)
    - cron: '30 22 * * 1-5'
    # 평일 오전 9:00 KST = UTC 00:00 (지표 리마인더)
    - cron: '0 0 * * 1-5'
    # 평일 오후 11:00 KST = UTC 14:00
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout (최신 portfolio.json 포함)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install yfinance pandas requests

      - name: portfolio.json 수동입력 확인
        run: |
          echo "=== portfolio.json manual_overrides ==="
          python -c "
          import json
          try:
              with open('portfolio.json') as f:
                  pf = json.load(f)
              mo = pf.get('manual_overrides', {})
              print('pmi:', mo.get('pmi'))
              print('m2_yoy:', mo.get('m2_yoy'))
              print('hy_spread:', mo.get('hy_spread'))
              print('claims:', mo.get('claims'))
          except Exception as e:
              print('오류:', e)
          "

      - name: 포트폴리오 업데이트 실행
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          MONTHLY_BUDGET:    ${{ vars.MONTHLY_BUDGET || '800000' }}
          START_DATE:        ${{ vars.START_DATE || '2024-01-01' }}
        run: python update.py

      - name: prices.json 커밋 & 푸시
        run: |
          git config user.name  "egg-portfolio-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || \
            git commit -m "📊 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push

name: 📊 포트폴리오 자동 업데이트
on:
  schedule:
    - cron: '0 0 * * 1-5'   # 평일 오전 9시 KST
    - cron: '0 14 * * 1-5'  # 평일 오후 11시 KST
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4
      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # 기존 3.11 → 3.12로 업데이트 (최신 버전 추천)
      - name: 📦 패키지 설치
        run: |
          python -m pip install --upgrade pip  # pip 업그레이드 추가 (안정성 향상)
          pip install requests pandas numpy yfinance finnhub-python  # 기존 유지 (finnhub-python 이미 포함, 불필요한 requirements.txt 대체)
      - name: 🚀 포트폴리오 업데이트 실행
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MONTHLY_BUDGET: ${{ vars.MONTHLY_BUDGET || '800000' }}  # 기본값 추가 (환경 변수 유연성)
          START_DATE: ${{ secrets.START_DATE }}  # 추가 (코드에서 사용하는 변수)
          WR_THRESHOLD: ${{ vars.WR_THRESHOLD || '-60' }}  # 추가 (코드에서 사용하는 변수)
        run: python update.py
      - name: 💾 결과 커밋 & 푸시
        if: always()  # 실패해도 커밋 시도 (로그 보존)
        continue-on-error: true  # 푸시 실패 무시
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "bot@portfolio.local"
          git add prices.json
          git diff --cached --quiet || git commit -m "📊 자동 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push

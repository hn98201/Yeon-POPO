<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>달걀이론 투자시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c14;
  --surface:#0d1220;
  --card:#111827;
  --card2:#161e30;
  --border:#1e2d45;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --green:#10b981;
  --red:#ef4444;
  --yellow:#f59e0b;
  --purple:#8b5cf6;
  --text:#e2e8f0;
  --text2:#64748b;
  --text3:#94a3b8;
  --mono:'JetBrains Mono',monospace;
  --sans:'Noto Sans KR',sans-serif;
}
html{background:var(--bg)}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:72px;
  overflow-x:hidden;
}
/* ── HEADER ── */
.topbar{
  position:sticky;top:0;z-index:200;
  background:rgba(8,12,20,0.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-logo{
  font-family:var(--mono);
  font-size:16px;font-weight:700;
  color:var(--accent2);
  letter-spacing:-0.5px;
}
.topbar-logo span{color:var(--text2)}
.topbar-time{font-size:11px;color:var(--text2);font-family:var(--mono)}
.refresh-btn{
  width:32px;height:32px;border-radius:8px;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;
  transition:background 0.15s;
}
.refresh-btn:active{background:var(--card2)}

/* ── TABS ── */
.tab-page{display:none;animation:fadeIn 0.2s ease}
.tab-page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── BOTTOM NAV ── */
.bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(13,18,32,0.96);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--text2);font-size:9px;font-family:var(--sans);
  letter-spacing:0.3px;
  transition:color 0.15s;
  position:relative;
}
.nav-btn.active{color:var(--accent2)}
.nav-btn.active::before{
  content:'';
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:32px;height:2px;border-radius:0 0 2px 2px;
  background:var(--accent);
}
.nav-icon{font-size:20px;line-height:1}
.nav-badge{
  position:absolute;top:6px;right:calc(50% - 18px);
  background:var(--red);color:#fff;
  font-size:9px;font-weight:700;
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);
}

/* ── CONTENT WRAPPER ── */
.page-content{padding:12px 14px}

/* ── CARDS ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
}
.card-label{
  font-size:10px;font-weight:500;
  color:var(--text2);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:10px;
  font-family:var(--mono);
}

/* ── EGG STAGE HERO ── */
.egg-hero{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:24px 20px 20px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
}
.egg-hero::before{
  content:'';
  position:absolute;top:-40px;right:-40px;
  width:150px;height:150px;
  background:radial-gradient(circle,rgba(59,130,246,0.12),transparent 70%);
  border-radius:50%;
}
.egg-stage-num{
  font-family:var(--mono);
  font-size:11px;color:var(--text2);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:6px;
}
.egg-stage-desc{
  font-size:26px;font-weight:700;
  line-height:1.2;margin-bottom:4px;
}
.egg-stage-score{
  font-family:var(--mono);
  font-size:13px;color:var(--text3);
}
.egg-score-bar{
  margin-top:16px;
}
.egg-score-labels{
  display:flex;justify-content:space-between;
  font-size:9px;color:var(--text2);font-family:var(--mono);
  margin-bottom:4px;
}
.score-track{
  height:4px;background:var(--border);
  border-radius:2px;overflow:hidden;
}
.score-fill{
  height:100%;border-radius:2px;
  transition:width 0.6s cubic-bezier(.4,0,.2,1);
}
.egg-sectors{
  display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;
}
.sector-chip{
  padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:500;
  background:rgba(59,130,246,0.12);
  border:1px solid rgba(59,130,246,0.25);
  color:var(--accent2);
}

/* ── STATS GRID ── */
.stats-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stats-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-tile{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 12px;text-align:center;
}
.stat-v{font-size:18px;font-weight:700;font-family:var(--mono);line-height:1.2}
.stat-l{font-size:10px;color:var(--text2);margin-top:3px}
.stat-tile.wide .stat-v{font-size:22px}

/* ── BUDGET CARD ── */
.budget-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 0;
}
.budget-arrow{font-size:18px;color:var(--text2)}
.budget-from{font-size:13px;color:var(--text2)}
.budget-amount{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--accent2)}
.budget-reason{
  font-size:11px;color:var(--text3);
  text-align:center;margin-top:8px;
  padding:6px 10px;background:var(--surface);border-radius:8px;
}

/* ── RS RANKING ── */
.rs-item{
  display:flex;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.rs-item:last-child{border-bottom:none}
.rs-rank{
  width:22px;font-size:10px;color:var(--text2);
  font-family:var(--mono);flex-shrink:0;
}
.rs-info{flex:1}
.rs-ticker{font-size:15px;font-weight:700;font-family:var(--mono)}
.rs-sector{font-size:11px;color:var(--text2);margin-top:1px}
.rs-score{
  font-size:14px;font-weight:600;font-family:var(--mono);
}

/* ── SIGNAL CARDS ── */
.signal-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px;margin-bottom:10px;
}
.signal-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:12px;
}
.signal-ticker{font-size:22px;font-weight:700;font-family:var(--mono)}
.signal-price{font-size:15px;color:var(--text3);font-family:var(--mono)}
.signal-badge{
  padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:600;
}
.badge-strong{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge-medium{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3)}
.badge-weak{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.signal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.signal-cell{
  background:var(--surface);border-radius:10px;
  padding:10px 8px;text-align:center;
}
.signal-cell-v{font-size:16px;font-weight:700;font-family:var(--mono);line-height:1.2}
.signal-cell-l{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ── HOLDINGS ── */
.holding-row{
  display:flex;align-items:center;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.holding-row:last-child{border-bottom:none}
.holding-icon{
  width:38px;height:38px;border-radius:10px;
  background:var(--card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;font-family:var(--mono);
  color:var(--accent2);flex-shrink:0;margin-right:12px;
}
.holding-info{flex:1;min-width:0}
.holding-ticker{font-size:15px;font-weight:700;font-family:var(--mono)}
.holding-meta{font-size:11px;color:var(--text2);margin-top:1px}
.holding-right{text-align:right;flex-shrink:0}
.holding-value{font-size:14px;font-weight:600;font-family:var(--mono)}
.holding-pnl{font-size:12px;font-family:var(--mono);margin-top:1px}

/* ── INDICATORS ── */
.ind-row{
  display:flex;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--border);
}
.ind-row:last-child{border-bottom:none}
.ind-dot{
  width:8px;height:8px;border-radius:50%;
  flex-shrink:0;margin-right:10px;
}
.ind-info{flex:1}
.ind-name{font-size:12px;color:var(--text3)}
.ind-detail{font-size:10px;color:var(--text2);margin-top:1px;font-family:var(--mono)}
.ind-right{text-align:right}
.ind-value{font-size:15px;font-weight:600;font-family:var(--mono)}
.ind-unit{font-size:10px;color:var(--text2)}

/* ── CHART ── */
.chart-wrap{position:relative;height:200px;margin-top:8px}

/* ── COLORS ── */
.c-green{color:var(--green)}
.c-red{color:var(--red)}
.c-yellow{color:var(--yellow)}
.c-accent{color:var(--accent2)}
.c-purple{color:var(--purple)}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:48px 20px;
  color:var(--text2);
}
.empty-icon{font-size:44px;margin-bottom:12px;display:block}
.empty-text{font-size:14px}
.empty-sub{font-size:12px;margin-top:6px;color:var(--text2)}

/* ── LOADING ── */
.loader{
  display:flex;flex-direction:column;align-items:center;
  padding:60px 20px;color:var(--text2);gap:14px;
}
.spin{
  width:36px;height:36px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:4px 0}

/* ── SECTION TITLE ── */
.section-title{
  font-size:11px;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:1.2px;
  font-family:var(--mono);padding:0 2px 8px;
  border-bottom:1px solid var(--border);margin-bottom:12px;
}

/* ── PILL ── */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;
  font-size:10px;font-weight:600;font-family:var(--mono);
}
.pill-blue{background:rgba(59,130,246,.15);color:var(--accent2);border:1px solid rgba(59,130,246,.25)}
.pill-green{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.pill-red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.pill-yellow{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">🥚 EGG<span>THEORY</span></div>
  <div id="topTime" class="topbar-time">로딩 중...</div>
  <div class="refresh-btn" onclick="loadData(true)">↻</div>
</div>

<!-- ──────────── TAB: 홈 ──────────── -->
<div id="pg-home" class="tab-page active">
  <div class="page-content">
    <div class="loader" id="homeLoader"><div class="spin"></div><span>데이터 로딩 중...</span></div>
    <div id="homeBody" style="display:none">

      <!-- Egg Stage Hero -->
      <div class="egg-hero" id="eggHero">
        <div class="egg-stage-num" id="eggStageNum">STAGE --</div>
        <div class="egg-stage-desc" id="eggDesc">분석 중...</div>
        <div class="egg-stage-score" id="eggScore">점수 --</div>
        <div class="egg-score-bar">
          <div class="egg-score-labels">
            <span>하락(-18)</span><span>중립(0)</span><span>과열(+18)</span>
          </div>
          <div class="score-track">
            <div class="score-fill" id="scoreFill" style="width:50%"></div>
          </div>
        </div>
        <div class="egg-sectors" id="eggSectors"></div>
      </div>

      <!-- VIX Budget Card -->
      <div class="card">
        <div class="card-label">VIX 기반 월 투자금 조절</div>
        <div class="budget-row">
          <div>
            <div style="font-size:11px;color:var(--text2)">기본 예산</div>
            <div style="font-size:16px;font-weight:600;font-family:var(--mono)" id="budgetBase">₩800,000</div>
          </div>
          <div class="budget-arrow">→</div>
          <div style="text-align:right">
            <div style="font-size:11px;color:var(--text2)">이번 달</div>
            <div class="budget-amount" id="budgetAdj">--</div>
          </div>
        </div>
        <div class="budget-reason" id="budgetReason">--</div>
      </div>

      <!-- Quick Stats -->
      <div class="stats-2">
        <div class="stat-tile wide">
          <div class="stat-v c-green" id="statTotal">--</div>
          <div class="stat-l">포트폴리오 가치</div>
        </div>
        <div class="stat-tile wide">
          <div class="stat-v" id="statPnl">--</div>
          <div class="stat-l">수익률</div>
        </div>
      </div>
      <div class="stats-2">
        <div class="stat-tile">
          <div class="stat-v c-yellow" id="statSignals">--</div>
          <div class="stat-l">매수 신호</div>
        </div>
        <div class="stat-tile">
          <div class="stat-v c-accent" id="statVix">--</div>
          <div class="stat-l">VIX</div>
        </div>
      </div>

      <!-- RS Top 8 -->
      <div class="card">
        <div class="card-label">RS 모멘텀 선정 종목 (Top 8)</div>
        <div id="rsRanking"><div style="color:var(--text2);font-size:13px;text-align:center;padding:16px">종목 데이터 없음</div></div>
      </div>

    </div><!-- /homeBody -->
  </div>
</div>

<!-- ──────────── TAB: 신호 ──────────── -->
<div id="pg-signals" class="tab-page">
  <div class="page-content" id="signalsBody">
    <div class="loader"><div class="spin"></div><span>신호 확인 중...</span></div>
  </div>
</div>

<!-- ──────────── TAB: 포트폴리오 ──────────── -->
<div id="pg-portfolio" class="tab-page">
  <div class="page-content" id="portfolioBody">
    <div class="loader"><div class="spin"></div><span>포트폴리오 로딩 중...</span></div>
  </div>
</div>

<!-- ──────────── TAB: 경제지표 ──────────── -->
<div id="pg-indicators" class="tab-page">
  <div class="page-content" id="indicatorsBody">
    <div class="loader"><div class="spin"></div><span>지표 로딩 중...</span></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottomnav">
  <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">
    <span class="nav-icon">🏠</span>홈
  </button>
  <button class="nav-btn" id="nav-signals" onclick="switchTab('signals')">
    <span class="nav-icon">🔔</span>신호
    <span class="nav-badge" id="signalBadge" style="display:none">0</span>
  </button>
  <button class="nav-btn" id="nav-portfolio" onclick="switchTab('portfolio')">
    <span class="nav-icon">💼</span>포트폴리오
  </button>
  <button class="nav-btn" id="nav-indicators" onclick="switchTab('indicators')">
    <span class="nav-icon">📊</span>경제지표
  </button>
</nav>

<script>
// ───────────────────────────────────
// STATE
// ───────────────────────────────────
let D = null;        // prices.json data
let bmChart = null;  // benchmark chart instance
let rendered = {};   // track rendered tabs

const STAGE_SECTORS = {
  1:['필수소비재','헬스케어','유틸리티'],
  2:['필수소비재','헬스케어','유틸리티'],
  3:['금융','산업재','필수소비재'],
  4:['기술','경기소비재','금융'],
  5:['헬스케어','경기소비재','기술'],
  6:['에너지','소재','산업재'],
};

// ───────────────────────────────────
// NAV
// ───────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('pg-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (!D) return;
  if (tab === 'portfolio' && !rendered.portfolio) renderPortfolio();
  if (tab === 'indicators' && !rendered.indicators) renderIndicators();
}

// ───────────────────────────────────
// HELPERS
// ───────────────────────────────────
const fmt = (n, dec=0) => n != null ? n.toLocaleString('ko-KR',{maximumFractionDigits:dec}) : '--';
const fmtUsd = (n, dec=2) => n != null ? '$'+n.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}) : '--';
const sign = v => v >= 0 ? '+' : '';
const colorClass = v => v == null ? '' : v >= 0 ? 'c-green' : 'c-red';

// ───────────────────────────────────
// DATA LOAD
// ───────────────────────────────────
async function loadData(manual = false) {
  try {
    if (manual) {
      document.getElementById('homeLoader').style.display = 'flex';
      document.getElementById('homeBody').style.display = 'none';
      rendered = {};
      if (bmChart) { bmChart.destroy(); bmChart = null; }
    }
    const r = await fetch('prices.json?t=' + Date.now());
    if (!r.ok) throw new Error(`prices.json 없음 (${r.status})`);
    D = await r.json();
    document.getElementById('topTime').textContent = D.updated_at || '';
    renderHome();
    renderSignals();
    // Signal badge
    const cnt = D.signals?.length || 0;
    const badge = document.getElementById('signalBadge');
    if (cnt > 0) { badge.textContent = cnt; badge.style.display = 'flex'; }
    else badge.style.display = 'none';
  } catch(e) {
    document.getElementById('homeLoader').innerHTML = `
      <span style="font-size:40px">⚠️</span>
      <span style="color:var(--red)">${e.message}</span>
      <span style="font-size:12px;color:var(--text2)">GitHub Actions 실행 후 prices.json이 생성됩니다</span>
    `;
  }
}

// ───────────────────────────────────
// HOME TAB
// ───────────────────────────────────
function renderHome() {
  const egg = D.egg;
  const stage = egg.stage;

  document.getElementById('eggStageNum').textContent = `STAGE ${stage}`;
  document.getElementById('eggDesc').textContent = egg.desc;
  document.getElementById('eggScore').textContent = `종합 점수: ${egg.score}점 / 최대 +18점`;

  // Score bar fill
  const pct = Math.min(100, Math.max(0, (egg.score + 18) / 36 * 100));
  const fill = document.getElementById('scoreFill');
  fill.style.width = pct + '%';
  fill.style.background = stage <= 2 ? 'var(--red)' : stage <= 3 ? 'var(--yellow)' : stage >= 5 ? 'var(--purple)' : 'var(--green)';

  // Egg hero color
  const hero = document.getElementById('eggHero');
  hero.style.borderColor = stage <= 2 ? 'rgba(239,68,68,.3)' : stage <= 3 ? 'rgba(245,158,11,.3)' : stage >= 5 ? 'rgba(139,92,246,.3)' : 'rgba(16,185,129,.3)';

  // Sectors
  const sectors = STAGE_SECTORS[stage] || [];
  document.getElementById('eggSectors').innerHTML = sectors.map(s =>
    `<span class="sector-chip">${s}</span>`
  ).join('');

  // Budget
  document.getElementById('budgetBase').textContent = `₩${fmt(D.budget?.base || D.settings?.monthly_budget)}`;
  document.getElementById('budgetAdj').textContent = `₩${fmt(D.budget?.amount)}`;
  document.getElementById('budgetReason').textContent = D.budget?.reason || '--';

  // Stats
  const ps = D.portfolio_summary;
  const portVal = ps?.total_value_krw;
  document.getElementById('statTotal').textContent = portVal ? `₩${fmt(portVal)}` : '₩0';
  const pnl = ps?.total_pnl_pct ?? 0;
  const pnlEl = document.getElementById('statPnl');
  pnlEl.textContent = `${sign(pnl)}${pnl.toFixed(2)}%`;
  pnlEl.className = 'stat-v ' + colorClass(pnl);
  document.getElementById('statSignals').textContent = (D.signals?.length || 0) + '개';
  document.getElementById('statVix').textContent = egg.indicators?.vix?.toFixed(1) || '--';

  // RS Ranking
  const ranking = D.rs_ranking || [];
  const rsEl = document.getElementById('rsRanking');
  if (ranking.length === 0) {
    rsEl.innerHTML = `<div style="color:var(--text2);text-align:center;padding:16px;font-size:13px">RS 데이터 없음</div>`;
  } else {
    rsEl.innerHTML = ranking.map((item, i) => {
      const rs = item.rs;
      const inSignal = D.signals?.some(s => s.ticker === item.ticker);
      return `
        <div class="rs-item">
          <span class="rs-rank">${i+1}</span>
          <div class="rs-info">
            <div class="rs-ticker">${item.ticker} ${inSignal ? '🔔' : ''}</div>
            <div class="rs-sector">${item.sector}</div>
          </div>
          <div class="rs-score ${colorClass(rs)}">${sign(rs)}${rs.toFixed(1)}%</div>
        </div>`;
    }).join('');
  }

  document.getElementById('homeLoader').style.display = 'none';
  document.getElementById('homeBody').style.display = 'block';
  rendered.home = true;
}

// ───────────────────────────────────
// SIGNALS TAB
// ───────────────────────────────────
function renderSignals() {
  const el = document.getElementById('signalsBody');
  const signals = D.signals || [];

  if (signals.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <span class="empty-icon">📭</span>
        <div class="empty-text">현재 매수 신호 없음</div>
        <div class="empty-sub">WR ≤ -50 조건 미충족</div>
      </div>
      <div class="card" style="margin-top:0">
        <div class="card-label">분할매수 기준</div>
        <div class="ind-row"><div class="ind-info"><div class="ind-name">WR ≤ -50</div></div><div class="ind-right"><span class="pill pill-green">30% 매수</span></div></div>
        <div class="ind-row"><div class="ind-info"><div class="ind-name">WR ≤ -70</div></div><div class="ind-right"><span class="pill pill-yellow">40% 매수</span></div></div>
        <div class="ind-row" style="border:none"><div class="ind-info"><div class="ind-name">WR ≤ -85</div></div><div class="ind-right"><span class="pill pill-red">30% 매수</span></div></div>
      </div>
    `;
    return;
  }

  const budgetAdj = D.budget?.amount || D.settings?.monthly_budget;
  let html = `
    <div class="card" style="text-align:center">
      <div style="font-size:11px;color:var(--text2);margin-bottom:4px">이번 달 조정 예산</div>
      <div style="font-size:28px;font-weight:700;font-family:var(--mono);color:var(--accent2)">₩${fmt(budgetAdj)}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">${D.budget?.reason || ''}</div>
    </div>
  `;

  signals.forEach(s => {
    const sig = s.allocation?.signal;
    const badgeCls = sig === 'STRONG' ? 'badge-strong' : sig === 'MEDIUM' ? 'badge-medium' : 'badge-weak';
    const sigLabel = sig === 'STRONG' ? '🔴 강매수 -85' : sig === 'MEDIUM' ? '🟡 중매수 -70' : '🟢 약매수 -50';
    const wrColor = (s.wr || 0) <= -70 ? 'c-red' : 'c-yellow';
    const dayChg = s.day_change_pct || s.pct || 0;
    html += `
      <div class="signal-card">
        <div class="signal-header">
          <div>
            <div class="signal-ticker">${s.ticker}</div>
            <div class="signal-price">${fmtUsd(s.price)} <span style="color:${dayChg>=0?'var(--green)':'var(--red)'};">${sign(dayChg)}${dayChg?.toFixed(2)}%</span></div>
            <div style="margin-top:6px"><span class="pill ${badgeCls === 'badge-strong' ? 'pill-red' : badgeCls === 'badge-medium' ? 'pill-yellow' : 'pill-green'}">${sigLabel}</span></div>
          </div>
          <div style="text-align:right">
            <div style="font-size:11px;color:var(--text2)">섹터</div>
            <div style="font-size:12px;font-weight:600">${s.sector}</div>
          </div>
        </div>
        <div class="signal-grid">
          <div class="signal-cell">
            <div class="signal-cell-v ${wrColor}">${s.wr?.toFixed(1) ?? '--'}</div>
            <div class="signal-cell-l">WR(%)</div>
          </div>
          <div class="signal-cell">
            <div class="signal-cell-v c-accent">${s.allocation?.pct ?? 0}%</div>
            <div class="signal-cell-l">투자비중</div>
          </div>
          <div class="signal-cell">
            <div class="signal-cell-v c-green">₩${fmt(s.allocation?.amount)}</div>
            <div class="signal-cell-l">투자금액</div>
          </div>
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
  rendered.signals = true;
}

// ───────────────────────────────────
// PORTFOLIO TAB
// ───────────────────────────────────
function renderPortfolio() {
  const el = document.getElementById('portfolioBody');
  const ps = D.portfolio_summary;
  const holdings = D.holdings || [];
  const pnl = ps?.total_pnl_pct ?? 0;

  let html = `
    <div class="card" style="text-align:center">
      <div style="font-size:11px;color:var(--text2);margin-bottom:4px">총 평가금액</div>
      <div style="font-size:30px;font-weight:700;font-family:var(--mono)">${ps?.total_value_krw ? '₩'+fmt(ps.total_value_krw) : '₩0'}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:2px">${fmtUsd(ps?.total_value_usd,0)}</div>
    </div>
    <div class="stats-2">
      <div class="stat-tile">
        <div class="stat-v ${colorClass(pnl)}">${sign(pnl)}${pnl.toFixed(2)}%</div>
        <div class="stat-l">총 수익률</div>
      </div>
      <div class="stat-tile">
        <div class="stat-v c-accent">₩${fmt(ps?.total_invested_krw)}</div>
        <div class="stat-l">총 투자금</div>
      </div>
    </div>
  `;

  // Holdings
  if (holdings.length > 0) {
    const sorted = [...holdings].sort((a,b) => b.current_value_usd - a.current_value_usd);
    html += `<div class="card"><div class="card-label">보유 종목 (${holdings.length}개)</div>`;
    sorted.forEach(h => {
      const p = h.pnl_pct ?? 0;
      const dc = h.day_change_pct ?? 0;
      html += `
        <div class="holding-row">
          <div class="holding-icon">${h.ticker.slice(0,3)}</div>
          <div class="holding-info">
            <div class="holding-ticker">${h.ticker}</div>
            <div class="holding-meta">${h.sector} · ${h.shares}주</div>
            <div style="font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:1px">
              평균 ${fmtUsd(h.avg_price_usd)} → ${fmtUsd(h.current_price)}
            </div>
          </div>
          <div class="holding-right">
            <div class="holding-value">₩${fmt(h.current_value_krw)}</div>
            <div class="holding-pnl ${colorClass(p)}">${sign(p)}${p.toFixed(2)}%</div>
            <div style="font-size:10px;color:${dc>=0?'var(--green)':'var(--red)'};font-family:var(--mono)">당일 ${sign(dc)}${dc.toFixed(2)}%</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  } else {
    html += `
      <div class="empty">
        <span class="empty-icon">📋</span>
        <div class="empty-text">portfolio.json에 종목을 입력하세요</div>
      </div>`;
  }

  // Benchmark chart
  html += `
    <div class="card">
      <div class="card-label">벤치마크 비교 (1년 · 주봉)</div>
      <div style="display:flex;gap:12px;margin-bottom:8px">
        <span class="pill pill-blue">VOO</span>
        <span class="pill pill-green">QQQ</span>
        <span class="pill pill-yellow">NOBL</span>
      </div>
      <div class="chart-wrap"><canvas id="bmChart"></canvas></div>
    </div>
    <div style="height:4px"></div>
  `;

  el.innerHTML = html;
  setTimeout(renderBenchmarkChart, 80);
  rendered.portfolio = true;
}

function renderBenchmarkChart() {
  const bm = D.benchmarks;
  if (!bm || !document.getElementById('bmChart')) return;
  if (bmChart) bmChart.destroy();

  const colors = { VOO:'#60a5fa', QQQ:'#10b981', NOBL:'#f59e0b' };
  const refKey = Object.keys(bm)[0];
  if (!refKey) return;
  const allLabels = bm[refKey].dates;

  // Sample every 4 entries for readability
  const step = 4;
  const labels = allLabels.filter((_,i) => i % step === 0);

  const datasets = Object.entries(bm).map(([t, d]) => ({
    label: t,
    data: d.pct.filter((_,i) => i % step === 0),
    borderColor: colors[t] || '#94a3b8',
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 0,
    tension: 0.35,
  }));

  bmChart = new Chart(document.getElementById('bmChart'), {
    type:'line',
    data:{ labels, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      animation:{ duration:600 },
      plugins:{
        legend:{ display:false },
        tooltip:{
          mode:'index', intersect:false,
          backgroundColor:'rgba(13,18,32,.95)',
          borderColor:'rgba(30,45,69,.8)', borderWidth:1,
          titleColor:'#94a3b8', bodyColor:'#e2e8f0',
          callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${sign(ctx.parsed.y)}${ctx.parsed.y.toFixed(1)}%` }
        }
      },
      scales:{
        x:{ ticks:{ color:'#475569', maxTicksLimit:6, font:{size:9} }, grid:{ color:'#1e2d45' } },
        y:{ ticks:{ color:'#475569', callback: v => v.toFixed(0)+'%', font:{size:9} }, grid:{ color:'#1e2d45' } }
      }
    }
  });
}

// ───────────────────────────────────
// INDICATORS TAB
// ───────────────────────────────────
function renderIndicators() {
  const el = document.getElementById('indicatorsBody');
  const ind = D.egg?.indicators || {};
  const det = D.egg?.scoring_details || {};
  const stage = D.egg?.stage || 3;
  const score = D.egg?.score || 0;

  const stageColors = {
    1:'var(--red)', 2:'var(--red)', 3:'var(--yellow)',
    4:'var(--green)', 5:'var(--purple)', 6:'var(--purple)'
  };
  const stageColor = stageColors[stage] || 'var(--accent)';

  const items = [
    { key:'vix',      name:'VIX 공포지수',          fmt: v => v?.toFixed(1),   unit:'',  dot: v => v>=25?'red':v<=15?'green':'yellow' },
    { key:'fed_rate', name:'기준금리 (^IRX 3M)',     fmt: v => v?.toFixed(2),   unit:'%', dot: v => v>=5?'red':v<=2?'green':'yellow' },
    { key:'spread',   name:'장단기 스프레드 (10Y-3M)',fmt: v => v?.toFixed(2),  unit:'%', dot: v => v<0?'red':v>=0.5?'green':'yellow' },
    { key:'cpi_yoy',  name:'CPI 인플레이션 YoY',     fmt: v => v?.toFixed(2),   unit:'%', dot: v => v>=4?'red':v<=2.5?'green':'yellow' },
    { key:'m2_yoy',   name:'M2 통화증가율 YoY',      fmt: v => v?.toFixed(1),   unit:'%', dot: v => v<=0?'red':v>=5?'green':'yellow' },
    { key:'hy_spread',name:'HY 스프레드 (추정)',      fmt: v => v?.toFixed(1),   unit:'%', dot: v => v>=4.5?'red':v<=3.5?'green':'yellow' },
    { key:'unemp',    name:'실업률',                  fmt: v => v?.toFixed(1),   unit:'%', dot: v => v>=4.5?'red':v<=3.8?'green':'yellow' },
    { key:'pmi',      name:'소비자심리 (Michigan)',   fmt: v => v?.toFixed(1),   unit:'',  dot: v => v<=50?'red':v>=70?'green':'yellow' },
    { key:'claims',   name:'신규실업수당 청구',        fmt: v => v ? (v/1000).toFixed(0)+'K' : '--', unit:'', dot: v => v>=250000?'red':v<=200000?'green':'yellow' },
  ];
  const dotColor = { red:'var(--red)', green:'var(--green)', yellow:'var(--yellow)' };

  let html = `
    <div class="card" style="text-align:center">
      <div style="font-size:11px;color:var(--text2);font-family:var(--mono);letter-spacing:1px;margin-bottom:8px">종합 경제 점수</div>
      <div style="font-size:42px;font-weight:700;font-family:var(--mono);color:${stageColor}">${score > 0 ? '+' : ''}${score}</div>
      <div style="font-size:16px;margin-top:4px">${D.egg?.desc}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:6px">경제는 주식보다 6~12개월 선행합니다</div>
    </div>

    <div class="card">
      <div class="card-label">9가지 핵심 지표</div>
  `;

  items.forEach(item => {
    const val = ind[item.key];
    const dotCls = item.dot(val);
    const detail = det[item.key] || '';
    const display = item.fmt(val);
    html += `
      <div class="ind-row">
        <div class="ind-dot" style="background:${dotColor[dotCls]}"></div>
        <div class="ind-info">
          <div class="ind-name">${item.name}</div>
          <div class="ind-detail">${detail}</div>
        </div>
        <div class="ind-right">
          <div class="ind-value" style="color:${dotColor[dotCls]}">${display ?? '--'}${display != null && display !== '--' ? item.unit : ''}</div>
        </div>
      </div>`;
  });

  html += `</div>`;

  // Data source notes
  html += `
    <div class="card">
      <div class="card-label">데이터 소스</div>
      <div class="ind-row"><div class="ind-info"><div class="ind-name">yfinance</div><div class="ind-detail">VIX, 단기금리, 장기금리, 환율, 주가</div></div><div class="ind-right"><span class="pill pill-green">실시간</span></div></div>
      <div class="ind-row"><div class="ind-info"><div class="ind-name">BLS 공식 API</div><div class="ind-detail">CPI YoY, 실업률 (정부 공식)</div></div><div class="ind-right"><span class="pill pill-green">월간</span></div></div>
      <div class="ind-row"><div class="ind-info"><div class="ind-name">UMICH</div><div class="ind-detail">소비자심리지수</div></div><div class="ind-right"><span class="pill pill-blue">월간</span></div></div>
      <div class="ind-row" style="border:none"><div class="ind-info"><div class="ind-name">수동 입력</div><div class="ind-detail">M2, HY스프레드, 신규청구 — portfolio.json</div></div><div class="ind-right"><span class="pill pill-yellow">수동</span></div></div>
    </div>
    <div style="font-size:11px;color:var(--text2);text-align:center;padding:8px">
      환율: ₩${fmt(D.fx_rate)} · ${D.updated_at}
    </div>
  `;

  el.innerHTML = html;
  rendered.indicators = true;
}

loadData();

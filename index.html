<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🥚 달걀이론 포트폴리오</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070B14;--surface:#0E1422;--card:#131929;--border:#1E2D4A;--accent:#2563EB;--accent2:#7C3AED;--green:#10B981;--blue:#3B82F6;--red:#EF4444;--yellow:#F59E0B;--purple:#8B5CF6;--text:#E2E8F0;--text-dim:#94A3B8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto+Sans KR',sans-serif;line-height:1.5;overflow-x:hidden}
.container{max-width:480px;margin:0 auto;padding-bottom:80px}
header{padding:20px;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:900;background:linear-gradient(to right,var(--accent),var(--accent2));-webkit-background-clip:text;color:transparent}
.updated-at{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono'}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(14,20,34,0.9);backdrop-filter:blur(10px);display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid var(--border);z-index:1000}
.nav-item{display:flex;flex-direction:column;align-items:center;color:var(--text-dim);text-decoration:none;font-size:10px;gap:4px;width:14%}
.nav-item.active{color:var(--accent)}
.section{display:none;padding:16px}
.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.label{font-size:12px;color:var(--text-dim);margin-bottom:4px}
.val{font-size:18px;font-weight:700;font-family:'JetBrains Mono'}
.indicator-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.ind-item{display:flex;justify-content:space-between;font-size:12px}
.ind-label{color:var(--text-dim)}
.ind-val{color:var(--text);font-family:'JetBrains Mono'}
.btn{background:var(--accent);color:white;border:none;padding:12px;border-radius:12px;width:100%;font-weight:700;margin-top:8px}
input,select{background:var(--surface);border:1px solid var(--border);color:white;padding:10px;border-radius:8px;width:100%;margin-bottom:10px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:10px 20px;border-radius:20px;font-size:13px;display:none;z-index:2000}
#toast.show{display:block;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">EGG THEORY</div>
    <div id="updatedAt" class="updated-at">-</div>
  </header>

  <div id="sec-home" class="section active">
    <div id="eggStageCard"></div>
    <div class="grid-2">
      <div class="card"><div class="label">총 자산</div><div id="totalValue" class="val">-</div></div>
      <div class="card"><div class="label">수익률</div><div id="totalPnl" class="val">-</div></div>
    </div>
    <div id="homeHoldingsList"></div>
  </div>

  <div id="sec-holdings" class="section">
    <h3 style="margin-bottom:15px">보유 종목</h3>
    <div id="fullHoldingsList"></div>
  </div>

  <div id="sec-signals" class="section">
    <h3 style="margin-bottom:15px">매수 신호</h3>
    <div id="signalList"></div>
  </div>

  <div id="sec-history" class="section">
    <h3 style="margin-bottom:10px">거래 입력</h3>
    <div class="card">
      <select id="txTicker"></select>
      <div class="grid-2">
        <select id="txType" onchange="onTxTypeChange()">
          <option value="buy">매수 (+)</option>
          <option value="sell">매도 (-)</option>
        </select>
        <input type="date" id="txDate">
      </div>
      <div class="grid-2">
        <input type="number" id="txShares" placeholder="수량" step="any">
        <input type="number" id="txPrice" placeholder="가격 ($)" step="any">
      </div>
      <input type="text" id="txNote" placeholder="메모">
      <button class="btn" onclick="addTx()">기록 저장</button>
    </div>
    <h3 style="margin:20px 0 10px">최근 내역</h3>
    <div id="historyList"></div>
  </div>

  <nav class="nav">
    <a href="#" class="nav-item active" onclick="showTab('home')"><span>🏠</span>홈</a>
    <a href="#" class="nav-item" onclick="showTab('holdings')"><span>📈</span>포트</a>
    <a href="#" class="nav-item" onclick="showTab('signals')"><span>🔔</span>신호</a>
    <a href="#" class="nav-item" onclick="showTab('history')"><span>📝</span>기록</a>
  </nav>
</div>
<div id="toast"></div>

<script>
let G = { portfolio:null, prices:null };

async function loadData(){
  try {
    const [pResp, rResp] = await Promise.all([
      fetch('portfolio.json?t='+Date.now()),
      fetch('prices.json?t='+Date.now())
    ]);
    G.portfolio = await pResp.json();
    G.prices = await rResp.json();
    renderAll();
  } catch(e) { console.error("데이터 로드 실패", e); }
}

function renderAll(){
  if(!G.prices) return;
  document.getElementById('updatedAt').textContent = G.prices.updated_at;
  renderHome();
  renderHoldings();
  renderSignals();
  renderHistory();
  populateTickerSelect();
}

function renderHome(){
  // 1. 달걀 및 9개 지표 카드
  const egg = G.prices.egg || {};
  const ind = egg.indicators || {};
  let eggHtml = `
    <div class="card" style="text-align:center">
      <div class="label">현재 시장 국면</div>
      <div style="font-size:28px; font-weight:900; color:var(--accent); margin:5px 0">달걀 ${egg.stage || '-'}단계</div>
      <div style="font-size:16px; font-weight:700">${egg.desc || '데이터 없음'}</div>
      
      <div class="indicator-grid">
        <div class="ind-item"><span class="ind-label">기준금리</span><span class="ind-val">${ind.fed_rate?.toFixed(2)||'-'}%</span></div>
        <div class="ind-item"><span class="ind-label">장단기차</span><span class="ind-val">${ind.term_spread?.toFixed(2)||'-'}%</span></div>
        <div class="ind-item"><span class="ind-label">VIX</span><span class="ind-val">${ind.vix?.toFixed(1)||'-'}</span></div>
        <div class="ind-item"><span class="ind-label">실업률</span><span class="ind-val">${ind.unemp?.toFixed(1)||'-'}%</span></div>
        <div class="ind-item"><span class="ind-label">CPI</span><span class="ind-val">${ind.cpi?.toFixed(1)||'-'}</span></div>
        <div class="ind-item"><span class="ind-label">산업생산</span><span class="ind-val">${ind.ind_prod?.toFixed(1)||'-'}</span></div>
        <div class="ind-item"><span class="ind-label">소매판매</span><span class="ind-val">${ind.retail_sales?.toFixed(1)||'-'}</span></div>
        <div class="ind-item"><span class="ind-label">주택착공</span><span class="ind-val">${ind.housing?.toFixed(1)||'-'}</span></div>
        <div class="ind-item"><span class="ind-label">HYG</span><span class="ind-val">${ind.high_yield?.toFixed(2)||'-'}</span></div>
      </div>
    </div>
  `;
  document.getElementById('eggStageCard').innerHTML = eggHtml;

  // 2. 총액 정보
  const summary = G.prices.portfolio_summary || {};
  document.getElementById('totalValue').textContent = '₩' + (summary.total_value_krw || 0).toLocaleString();
  const pnl = summary.total_pnl_pct || 0;
  document.getElementById('totalPnl').textContent = (pnl > 0 ? '+' : '') + pnl + '%';
  document.getElementById('totalPnl').style.color = pnl >= 0 ? 'var(--red)' : 'var(--blue)';

  // 3. 홈 화면 간이 종목 리스트 (현재가 + 수익률 포함)
  let listHtml = '';
  (G.prices.holdings || []).forEach(h => {
    const pColor = h.pnl_pct >= 0 ? 'var(--red)' : 'var(--blue)';
    listHtml += `
      <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px">
        <div>
          <div style="font-weight:700">${h.ticker} <span style="font-size:11px; color:var(--text-dim); font-weight:400">${h.sector}</span></div>
          <div style="font-size:12px; color:var(--text-dim)">평단 $${h.avg_price_usd.toFixed(2)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700; font-family:'JetBrains Mono'">$${h.current_price.toFixed(2)}</div>
          <div style="font-size:12px; color:${pColor}; font-weight:700">${h.pnl_pct > 0 ? '+' : ''}${h.pnl_pct.toFixed(2)}%</div>
        </div>
      </div>
    `;
  });
  document.getElementById('homeHoldingsList').innerHTML = listHtml;
}

function renderHoldings(){
  let html = '';
  (G.prices.holdings || []).forEach(h => {
    html += `
      <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
          <span style="font-weight:900; font-size:18px">${h.ticker}</span>
          <span style="background:var(--surface); padding:2px 8px; border-radius:4px; font-size:11px">${h.sector}</span>
        </div>
        <div class="grid-2">
          <div><div class="label">보유수량</div><div style="font-size:14px">${h.shares.toFixed(4)}</div></div>
          <div><div class="label">평가금액</div><div style="font-size:14px">₩${h.current_value_krw.toLocaleString()}</div></div>
        </div>
      </div>
    `;
  });
  document.getElementById('fullHoldingsList').innerHTML = html || '<p style="text-align:center; color:var(--text-dim)">보유 종목이 없습니다.</p>';
}

function renderSignals(){
  let html = '';
  const signals = G.prices.active_signals || [];
  signals.forEach(s => {
    const color = s.strength === '강' ? 'var(--red)' : (s.strength === '중' ? 'var(--yellow)' : 'var(--green)');
    html += `
      <div class="card" style="border-left:4px solid ${color}">
        <div style="display:flex; justify-content:space-between">
          <span style="font-weight:700">${s.ticker} (${s.strength}매수)</span>
          <span style="font-family:'JetBrains Mono'">WR: ${s.wr.toFixed(1)}</span>
        </div>
        <div style="font-size:13px; margin-top:5px; color:var(--text-dim)">
          권장: 약 ₩${s.recommend_krw.toLocaleString()} ($${s.recommend_usd.toFixed(2)})
        </div>
      </div>
    `;
  });
  document.getElementById('signalList').innerHTML = html || '<p style="text-align:center; color:var(--text-dim)">현재 발생한 신호가 없습니다.</p>';
}

function renderHistory(){
  let html = '';
  const txs = [...(G.portfolio.transactions || [])].reverse().slice(0,10);
  txs.forEach(t => {
    html += `
      <div style="font-size:13px; padding:10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between">
        <span>${t.date} <b>${t.ticker}</b></span>
        <span>${t.type==='buy'?'+':'-'}${t.shares}주 ($${t.price_usd})</span>
      </div>
    `;
  });
  document.getElementById('historyList').innerHTML = html;
}

function populateTickerSelect(){
  const sel = document.getElementById('txTicker');
  const tickers = ["KO","PG","PEP","CL","KMB","MKC","GIS","SYY","WMT","TGT","HRL","CLX","ADM","CPB","SJM","CHD","EMR","SWK","EXPD","DOV","GPC","ITT","PNR","TXN","IBM","ADP","VFC","LOW","TROW","BEN"];
  sel.innerHTML = tickers.map(t => `<option value="${t}">${t}</option>`).join('');
}

function onTxTypeChange(){
  const type = document.getElementById('txType').value;
  document.getElementById('txPrice').placeholder = type==='buy' ? "매수가 ($)" : "매도가 ($)";
}

function showTab(name){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  const idx = ['home','holdings','signals','history'].indexOf(name);
  document.querySelectorAll('.nav-item')[idx].classList.add('active');
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// 초기 로드
loadData();
</script>
</body>
</html>
